stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"

# ---------- TEMPLATES ----------

.build_dev_template:
  stage: build
  image: docker:25
  script:
    - docker compose -f docker-compose.yml build

.deploy_dev_template:
  stage: deploy
  image: docker:25
  script:
    - docker compose -f docker-compose.yml down
    - docker compose -f docker-compose.yml up -d
    - docker image prune -f

.build_prod_template:
  stage: build
  image: docker:25
  script:
    - docker compose -f docker-compose.yml build

.deploy_prod_template:
  stage: deploy
  image: docker:25
  script:
    - docker compose -f docker-compose.yml down
    - docker compose -f docker-compose.yml up -d
    - docker image prune -f

