<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>Taxi Routing</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: {{ bg }};
      --bg-card: {{ bg_card }};
      --bg-input: {{ bg_input }};
      --bg-console: {{ bg_console }};
      --fg: {{ fg }};
      --fg-dim: {{ fg_dim }};
      --fg-accent: {{ fg_accent }};
      --fg-green: {{ fg_green }};
      --fg-yellow: {{ fg_yellow }};
      --fg-red: {{ fg_red }};
      --border: {{ border }};
      --highlight: {{ highlight }};
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
{% include "index_body_inner.html" %}
<script>
window.TAXI_APP = {
  csrfToken: "{{ csrf_token() }}",
  statusUnsetFilter: "{{ status_unset_filter }}",
  statuses: {{ statuses|tojson }},
  defaultCostPerCar: {{ cost_per_car }},
  defaultCostPerKm: {{ cost_per_km }},
  officeLat: {{ office_lat }},
  officeLon: {{ office_lon }},
  colors: {
    fg_green: "{{ fg_green }}",
    fg_yellow: "{{ fg_yellow }}",
    fg_red: "{{ fg_red }}",
  },
};
</script>
<script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
