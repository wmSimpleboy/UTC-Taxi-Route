# Taxi Locations — OSRM + optional web app
#
# Подготовка данных OSRM (один раз, на хосте):
#   см. setup_osrm.ps1 или команды в README внизу этого файла.
#
# Только маршрутизация OSRM (порт 5000):
#   docker compose up -d osrm
#
# OSRM + веб-приложение (профиль full):
#   docker compose --profile full up -d --build
#
# Веб на хосте, OSRM в Docker:
#   docker compose up -d osrm
#   В .env: OSRM_BASE_URL=http://localhost:5000

services:
  osrm:
    image: osrm/osrm-backend
    container_name: taxi-locations-osrm
    restart: unless-stopped
    ports:
      - "${OSRM_HOST_PORT:-5000}:5000"
    volumes:
      - ./osrm-data:/data:ro
    command: osrm-routed --algorithm mld /data/uzbekistan-latest.osrm

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-locations-web
    restart: unless-stopped
    depends_on:
      osrm:
        condition: service_started
    ports:
      - "${FLASK_HOST_PORT:-5002}:5002"
    environment:
      FLASK_PORT: "5002"
      FLASK_HOST: "0.0.0.0"
      FLASK_DEBUG: "0"
      # Внутри сети compose обращаемся к сервису osrm по имени
      OSRM_BASE_URL: http://osrm:5000
    env_file:
      - path: .env
        required: false
    volumes:
      # Персистентность сотрудников и загрузки на хосте
      - ./TaxiLocations/employees.json:/app/TaxiLocations/employees.json

# ---
# Первичная подготовка osrm-data/ (если папки ещё нет или нет .osrm файлов):
#
#   mkdir -p osrm-data
#   curl -L -o osrm-data/uzbekistan-latest.osm.pbf \
#     http://download.geofabrik.de/asia/uzbekistan-latest.osm.pbf
#
#   docker run --rm -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
#     osrm-extract -p /opt/car.lua /data/uzbekistan-latest.osm.pbf
#   docker run --rm -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
#     osrm-partition /data/uzbekistan-latest.osrm
#   docker run --rm -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
#     osrm-customize /data/uzbekistan-latest.osrm
#
# Затем:
#   docker compose up -d osrm
